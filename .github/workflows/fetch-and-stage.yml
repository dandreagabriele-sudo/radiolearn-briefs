name: Fetch and Stage Candidates

# Runs Saturday 12:30 UTC (= 14:30 CEST) — 30 min before the routine wakes up.
# Manual trigger also supported for testing.
on:
  schedule:
    - cron: '30 12 * * 6'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Run fetch and stage
        env:
          # Built-in GITHUB_TOKEN is authorized for repo contents (permissions.contents: write).
          # Previously used secrets.GH_PAT, but that PAT expired and returned HTTP 401.
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}
          NCBI_EMAIL: ${{ secrets.NCBI_EMAIL }}
        run: python3 .github/scripts/fetch_sources.py
