name: Send Brief to Telegram

# Triggered when the routine commits a notification file to outbox/.
# Delivers the message to Telegram and cleans up the outbox file.
on:
  push:
    branches: [main]
    paths:
      - 'outbox/*.json'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Deliver outbox messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Built-in GITHUB_TOKEN is authorized for repo contents (permissions.contents: write).
          # Previously used secrets.GH_PAT, but that PAT expired and returned HTTP 401.
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: python3 .github/scripts/deliver_outbox.py
