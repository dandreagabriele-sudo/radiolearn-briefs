name: Send Brief to Telegram

# Triggered when the routine commits a notification file to outbox/.
# Delivers the message to Telegram and cleans up the outbox file.
on:
  push:
    branches: [main]
    paths:
      - 'outbox/*.json'
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Deliver outbox messages
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          # Built-in token — scoped by `permissions: contents: write` above.
          # Replaces the removed/expired GH_PAT (HTTP 401 from Contents API).
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
        run: python3 .github/scripts/deliver_outbox.py
